name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run lint check
        run: |
          echo "Linting TypeScript files (packages/*/src and src/):"
          find packages/*/src src -name "*.ts" -type f 2>/dev/null | sort | head -30
          echo ""
          echo "Total TypeScript files to lint:"
          find packages/*/src src -name "*.ts" -type f 2>/dev/null | wc -l
          echo ""
          npm run lint

      - name: Run format check
        run: |
          echo "Checking formatting for TypeScript files (packages/*/src, src/, and getting_started/):"
          find packages/*/src src getting_started -name "*.ts" -type f 2>/dev/null | wc -l
          echo "files"
          echo ""
          npm run format:check

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: |
          echo "Type checking TypeScript files (tsconfig.json excludes getting_started/):"
          echo ""
          echo "TypeScript files in packages/:"
          find packages -name "*.ts" -type f 2>/dev/null | wc -l || echo "0"
          echo ""
          echo "TypeScript files in src/:"
          find src -name "*.ts" -type f 2>/dev/null | wc -l || echo "0"
          echo ""
          npm run typecheck

  test-node-20:
    name: Test - Node 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  test-node-22:
    name: Test - Node 22
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  getting-started-example:
    name: Getting Started Example
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            getting_started/examples/openai/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install example dependencies
        working-directory: getting_started/examples/openai
        run: npm ci

      - name: Lint example
        working-directory: getting_started/examples/openai
        run: npx eslint src/**/*.ts

      - name: Type check example
        working-directory: getting_started/examples/openai
        run: npx tsc --noEmit

  build:
    name: Build Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Check build output
        run: |
          echo "Checking dist/ output:"
          ls -lah dist/
          echo ""
          echo "Verifying package exports:"
          node --input-type=module -e "import('./dist/index.js').then((tac) => { console.log('Successfully imported package'); console.log('Exports:', Object.keys(tac).slice(0, 10).join(', '), '...'); });"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  all-checks:
    name: All Checks Passed
    needs: [lint, type-check, test-node-20, test-node-22, getting-started-example, build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all job statuses
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs['type-check'].result }}" != "success" ] || \
             [ "${{ needs['test-node-20'].result }}" != "success" ] || \
             [ "${{ needs['test-node-22'].result }}" != "success" ] || \
             [ "${{ needs['getting-started-example'].result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ]; then
            echo "One or more checks failed"
            exit 1
          fi
          echo "All checks passed successfully!"
